# AI VLSI Factory — GitHub Actions CI
name: VLSI Simulation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  simulate:
    name: Icarus Verilog Simulation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Verify iverilog installation
        run: iverilog -V

      - name: Create sim directory
        run: mkdir -p sim

      - name: Compile RTL and Testbench
        run: |
          iverilog -g2012 -o sim/sim.vvp rtl/*.sv tb/*.sv

      - name: Run Simulation
        run: vvp sim/sim.vvp

      - name: Upload simulation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: simulation-results
          path: |
            sim/
            docs/
